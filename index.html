  const STORE_SNAPSHOTS = 'snapshots';

  let _dbPromise = null;
  function openDB() {
    if (_dbPromise) return _dbPromise;
    _dbPromise = new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VER);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(STORE_HANDLES)) {
          db.createObjectStore(STORE_HANDLES);
        }
        if (!db.objectStoreNames.contains(STORE_SNAPSHOTS)) {
          db.createObjectStore(STORE_SNAPSHOTS, { keyPath: 'ts' });
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror   = () => reject(req.error);
    });
    return _dbPromise;
  }

  async function idbPut(store, key, val) {
    const db = await openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction(store, 'readwrite');
      const s  = tx.objectStore(store);
      const r  = (store === STORE_SNAPSHOTS) ? s.put(val) : s.put(val, key);
      r.onsuccess = () => res();
      r.onerror   = () => rej(r.error);
    });
  }

  async function idbGet(store, key) {
    const db = await openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction(store, 'readonly');
      const r  = tx.objectStore(store).get(key);
      r.onsuccess = () => res(r.result);
      r.onerror   = () => rej(r.error);
    });
  }

  async function idbGetAll(store) {
    const db = await openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction(store, 'readonly');
      const r  = tx.objectStore(store).getAll();
      r.onsuccess = () => res(r.result || []);
      r.onerror   = () => rej(r.error);
    });
  }

  async function idbDelete(store, key) {
    const db = await openDB();
    return new Promise((res, rej) => {
      const tx = db.transaction(store, 'readwrite');
      const r  = tx.objectStore(store).delete(key);
      r.onsuccess = () => res();
      r.onerror   = () => rej(r.error);
    });
  }

  // ─── FileHandle persist ─────────────────────────────────────────
  const _origExportCurrent = window.exportCurrentProject;
  window.exportCurrentProject = async function () {
    const pid = state.activeProjectId;
    const before = pid ? fileHandles.projects[pid] : null;
    await _origExportCurrent.apply(this, arguments);
    const after = pid ? fileHandles.projects[pid] : null;
    if (after && after !== before) {
      try { await idbPut(STORE_HANDLES, pid, after); } catch(e) {}
    }
  };

  const _origExportSingle = window.exportSingleProject;
  window.exportSingleProject = async function (pid) {
    const before = fileHandles.projects[pid];
    await _origExportSingle.apply(this, arguments);
    const after = fileHandles.projects[pid];
    if (after && after !== before) {
      try { await idbPut(STORE_HANDLES, pid, after); } catch(e) {}
    }
  };

  const _origDisconnectProj = window.disconnectProjectFile;
  window.disconnectProjectFile = function (pid) {
    _origDisconnectProj.apply(this, arguments);
    idbDelete(STORE_HANDLES, pid).catch(() => {});
  };

  const _origDisconnectAll = window.disconnectAllFile;
  window.disconnectAllFile = function () {
    _origDisconnectAll.apply(this, arguments);
    idbDelete(STORE_HANDLES, 'all').catch(() => {});
  };

  // ─── tryAutoReconnect 실제 구현 ─────────────────────────────────
  window.tryAutoReconnect = async function () {
    try {
      const db = await openDB();
      const tx = db.transaction(STORE_HANDLES, 'readonly');
      const s  = tx.objectStore(STORE_HANDLES);
      const keysReq = s.getAllKeys();
      const valsReq = s.getAll();
      const [keys, vals] = await Promise.all([
        new Promise(r => keysReq.onsuccess = () => r(keysReq.result)),
        new Promise(r => valsReq.onsuccess = () => r(valsReq.result)),
      ]);

      let restored = 0;
      for (let i = 0; i < keys.length; i++) {
        const key    = keys[i];
        const handle = vals[i];
        if (!handle || typeof handle.queryPermission !== 'function') continue;

        const perm = await handle.queryPermission({ mode: 'readwrite' });
        if (perm === 'granted' || perm === 'prompt') {
          if (key === 'all') fileHandles.all = handle;
          else               fileHandles.projects[key] = handle;
          if (perm === 'granted') restored++;
        } else {
          await idbDelete(STORE_HANDLES, key);
        }
      }
      if (restored > 0) {
        updateFileStatus();
      }
    } catch (e) {
    }
  };

  const _origSaveToStorage = window.saveToStorage;
  window.saveToStorage = function () {
    _origSaveToStorage.apply(this, arguments);
    ensureHandlePermissions().catch(() => {});
  };

  async function ensureHandlePermissions() {
    const handles = [];
    if (fileHandles.all) handles.push(['all', fileHandles.all]);
    for (const pid in fileHandles.projects) {
      handles.push([pid, fileHandles.projects[pid]]);
    }
    for (const [key, h] of handles) {
      if (typeof h.queryPermission !== 'function') continue;
      const perm = await h.queryPermission({ mode: 'readwrite' });
      if (perm === 'denied') {
        if (key === 'all') fileHandles.all = null;
        else               delete fileHandles.projects[key];
        await idbDelete(STORE_HANDLES, key);
        updateFileStatus();
      }
    }
  }

  // ─── pagehide/visibilitychange 시 pending save flush ────────────
  function flushPendingSaves() {
    if (window._saveTimer) {
      clearTimeout(window._saveTimer);
      window._saveTimer = null;
      try { autoSave(); } catch(e) {}
    }
    if (window._memoSaveTimer) {
      clearTimeout(window._memoSaveTimer);
      window._memoSaveTimer = null;
      try { if (typeof saveMemos === 'function') saveMemos(); } catch(e) {}
    }
  }

  window.addEventListener('pagehide', flushPendingSaves);
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') flushPendingSaves();
  });

  // ─── 자동 스냅샷 ────────────────────────────────────────────────
  const SNAPSHOT_INTERVAL_MS = 15 * 60 * 1000;
  const SNAPSHOT_KEEP = 20;

  async function takeSnapshot(reason) {
    try {
      if (!state.projects || state.projects.length === 0) return;
      const snap = {
        ts: Date.now(),
        reason: reason || 'auto',
        projects: state.projects,
      };
      await idbPut(STORE_SNAPSHOTS, null, snap);
      const all = await idbGetAll(STORE_SNAPSHOTS);
      all.sort((a, b) => b.ts - a.ts);
      const old = all.slice(SNAPSHOT_KEEP);
      for (const s of old) await idbDelete(STORE_SNAPSHOTS, s.ts);
    } catch(e) {
    }
  }

  setTimeout(() => takeSnapshot('initial'), 5000);
  setInterval(() => takeSnapshot('interval'), SNAPSHOT_INTERVAL_MS);
  window.addEventListener('pagehide', () => takeSnapshot('pagehide'));

  window.listSnapshots = async function () {
    const all = await idbGetAll(STORE_SNAPSHOTS);
    return all
      .sort((a, b) => b.ts - a.ts)
      .map(s => ({
        ts: s.ts,
        when: new Date(s.ts).toLocaleString('ko-KR'),
        reason: s.reason,
        projectCount: (s.projects || []).length,
      }));
  };

  window.restoreSnapshot = async function (ts) {
    const snap = await idbGet(STORE_SNAPSHOTS, ts);
    if (!snap) { alert('해당 스냅샷을 찾을 수 없어요.'); return; }
    if (!confirm(new Date(ts).toLocaleString('ko-KR') + ' 시점으로 되돌립니다.\n현재 데이터는 별도 스냅샷으로 보관됩니다.')) return;
    await takeSnapshot('before-restore');
    state.projects = snap.projects;
    saveToStorage();
    location.reload();
  };

  // ─── 저장 상태 인디케이터 ───────────────────────────────────────
  let _lastSaveAt = null;

  const _origAutoSave = window.autoSave;
  window.autoSave = function () {
    _origAutoSave.apply(this, arguments);
    _lastSaveAt = Date.now();
    renderSaveIndicator();
  };

  function formatSaveAgo(ms) {
    if (ms < 3000)    return '방금 전';
    if (ms < 60000)   return Math.floor(ms / 1000) + '초 전';
    if (ms < 3600000) return Math.floor(ms / 60000) + '분 전';
    return Math.floor(ms / 3600000) + '시간 전';
  }

  function renderSaveIndicator() {
    let el = document.getElementById('save-indicator');
    if (!el) {
      const host = document.getElementById('file-status');
      if (!host) return;
      el = document.createElement('span');
      el.id = 'save-indicator';
      el.style.cssText = 'font-size:11px;color:var(--teal2);margin-right:6px;white-space:nowrap';
      host.parentNode.insertBefore(el, host);
    }
    if (_lastSaveAt == null) { el.textContent = ''; return; }
    const ago = Date.now() - _lastSaveAt;
    el.innerHTML = '<span style="opacity:.7">저장됨 · ' + formatSaveAgo(ago) + '</span>';
  }

  setInterval(renderSaveIndicator, 30 * 1000);

  // ─── 제목/상태 등 onchange → 실시간 저장 보강 ───────────────────
  document.addEventListener('input', (e) => {
    const t = e.target;
    if (!(t instanceof HTMLInputElement) && !(t instanceof HTMLTextAreaElement)) return;
    const oc = t.getAttribute('onchange');
    if (!oc) return;
    if (!/update(Chapter|Project|Char|World|Arc|Scene|Item|Glossary|Family|Foreshadow|Chronicle|PsyArc)/.test(oc)) return;
    clearTimeout(t._safetyTimer);
    t._safetyTimer = setTimeout(() => {
      try { new Function('event', oc).call(t, e); } catch(err) {}
    }, 500);
  }, true);

  setTimeout(renderSaveIndicator, 100);
})();
</script>


<!-- ═══════════════════════════════════════════════════════════════
     TIER 1 — Undo/Redo 보강 패치 (v1)
     이 <script> 블록을 index.html 의 </body> 직전에 추가.
     데이터 안전 패치 다음에 오게 배치 권장.
     
     전략:
     1) ta.value = ... 로 프로그램적 조작하는 곳을 전부
        document.execCommand('insertText', ...) 로 치환
        → 브라우저 native undo 스택에 자연스럽게 쌓임
     2) 찾아바꾸기 "모두 바꾸기" 같은 대량 변경은
        변경 전 스냅샷을 커스텀 스택(화별 Map)에 push
     3) 화 전환/리렌더로 textarea 가 재생성되면
        해당 화의 직전 스냅샷이 커스텀 스택에 남아있음
     4) Ctrl+Z 가 브라우저 native 로 아무것도 못 되돌리는 순간
        커스텀 스택이 발동해서 직전 버전 복원
     
     ESC·ctrl+z 등 기존 단축키는 그대로 유지.
     ═══════════════════════════════════════════════════════════════ -->
<script>
(function UndoRedoPatch() {
  'use strict';

  // ─── 유틸: execCommand 로 텍스트 삽입 ───────────────────────────
  // textarea/input 에도 동작. 쌍 기호일 때도 한 번의 execCommand 로
  // 넣어야 undo 한 번에 되돌려짐.
  function insertTextAtCursor(el, text, opts) {
    opts = opts || {};
    el.focus();
    const s = el.selectionStart, e = el.selectionEnd;

    // execCommand 시도 (브라우저 native undo stack 보존)
    let ok = false;
    try {
      ok = document.execCommand('insertText', false, text);
    } catch (err) { ok = false; }

    // 실패 시 폴백 — 최소한 직전 스냅샷은 커스텀 스택에 저장
    if (!ok) {
      pushCustomSnapshot(el);
      const before = el.value.slice(0, s);
      const after  = el.value.slice(e);
      el.value = before + text + after;
      el.selectionStart = el.selectionEnd = s + text.length;
      el.dispatchEvent(new Event('input', { bubbles: true }));
      return;
    }

    // 쌍 기호 처리: 선택 영역을 감싸고 내부를 선택 상태로
    if (opts.selectInner && opts.innerLen != null) {
      el.selectionStart = s + 1;
      el.selectionEnd   = s + 1 + opts.innerLen;
    } else if (opts.cursorOffset != null) {
      el.selectionStart = el.selectionEnd = s + opts.cursorOffset;
    }
  }

  // ─── 커스텀 스냅샷 스택 (화별) ──────────────────────────────────
  // 화 ID → [{content, selStart, selEnd, ts}, ...]
  // 최근 10개만 유지. textarea 재생성/대량 변경 시 직전 상태 보존용.
  const CUSTOM_STACK_MAX = 10;
  const _customStacks = new Map(); // chapterId → snapshot[]
  const _customRedo   = new Map(); // chapterId → snapshot[]

  function currentChapterId() {
    // activeChapterId 전역, focus 모드도 동일 ID 사용
    return (typeof activeChapterId !== 'undefined') ? activeChapterId : null;
  }

  function pushCustomSnapshot(el) {
    const cid = currentChapterId();
    if (!cid) return;
    const stack = _customStacks.get(cid) || [];
    const last  = stack[stack.length - 1];
    // 동일 내용이면 스킵
    if (last && last.content === el.value) return;
    stack.push({
      content:  el.value,
      selStart: el.selectionStart,
      selEnd:   el.selectionEnd,
      ts: Date.now(),
    });
    while (stack.length > CUSTOM_STACK_MAX) stack.shift();
    _customStacks.set(cid, stack);
    // 새 스냅샷이 쌓이면 redo 는 비움
    _customRedo.set(cid, []);
  }

  function popCustomSnapshot() {
    const cid = currentChapterId();
    if (!cid) return null;
    const stack = _customStacks.get(cid) || [];
    return stack.pop() || null;
  }

  function peekCustomSnapshot() {
    const cid = currentChapterId();
    if (!cid) return null;
    const stack = _customStacks.get(cid) || [];
    return stack[stack.length - 1] || null;
  }

  // ─── idle 스냅샷: 타이핑 300ms 멈추면 1회 기록 ───────────────────
  // 과도하게 쌓이지 않게 내용 변동 임계치도 체크.
  let _idleTimer = null;
  let _lastSnapshotContent = '';

  function scheduleIdleSnapshot(el) {
    clearTimeout(_idleTimer);
    _idleTimer = setTimeout(() => {
      if (!el || !document.body.contains(el)) return;
      // 직전 스냅샷과 같으면 무시
      const last = peekCustomSnapshot();
      if (last && last.content === el.value) return;
      // 최소 변동: 5자 이상 차이 날 때만
      if (_lastSnapshotContent &&
          Math.abs(el.value.length - _lastSnapshotContent.length) < 5) return;
      pushCustomSnapshot(el);
      _lastSnapshotContent = el.value;
    }, 300);
  }

  // ─── 기존 insertSymbol 덮어쓰기 ─────────────────────────────────
  const _origInsertSymbol = window.insertSymbol;
  window.insertSymbol = function (sym) {
    const ta = document.getElementById('prose-editor');
    if (!ta) return;
    const s = ta.selectionStart, e = ta.selectionEnd;
    const selected = ta.value.slice(s, e);
    const isPair = sym.length === 2;

    if (isPair) {
      const inner = selected || '';
      const text = sym[0] + inner + sym[1];
      insertTextAtCursor(ta, text, {
        selectInner: !!inner,
        innerLen: inner.length,
        cursorOffset: inner ? null : 1,
      });
    } else {
      insertTextAtCursor(ta, sym, { cursorOffset: sym.length });
    }
    ta.dispatchEvent(new Event('input', { bubbles: true }));
  };

  // ─── 집중 모드 기호 버튼 / Ctrl+숫자 단축키 덮어쓰기 ─────────────
  // 원본이 keydown 리스너로 달려있고 제거할 방법이 없어서,
  // capture 단계에서 가로채고 stopImmediatePropagation 으로
  // 원본이 실행되지 않게 막은 뒤 우리가 execCommand 로 처리.
  window.addEventListener('keydown', (e) => {
    if (!(e.ctrlKey || e.metaKey)) return;
    if (typeof SHORTCUT_SYMBOLS === 'undefined') return;
    const sym = SHORTCUT_SYMBOLS[e.key];
    if (!sym) return;

    const ta = document.getElementById('prose-editor');
    const fe = document.getElementById('focus-editor');
    const active = document.activeElement;
    if (active !== ta && active !== fe) return;

    e.preventDefault();
    e.stopImmediatePropagation();

    const target = active;
    const s = target.selectionStart, en = target.selectionEnd;
    const selected = target.value.slice(s, en);
    const isPair = sym.length === 2;

    if (isPair) {
      const inner = selected || '';
      const text = sym[0] + inner + sym[1];
      insertTextAtCursor(target, text, {
        selectInner: !!inner,
        innerLen: inner.length,
        cursorOffset: inner ? null : 1,
      });
    } else {
      insertTextAtCursor(target, sym, { cursorOffset: sym.length });
    }
    target.dispatchEvent(new Event('input', { bubbles: true }));
  }, true); // capture = true, 원본보다 먼저 실행

  // ─── 찾아바꾸기 frReplace / frReplaceAll 덮어쓰기 ────────────────
  // 특히 "모두 바꾸기"는 변경 전 스냅샷을 커스텀 스택에 넣어
  // Ctrl+Z 한 방에 전체 롤백 가능하게 한다.
  const _origFrReplace = window.frReplace;
  if (typeof _origFrReplace === 'function') {
    window.frReplace = function () {
      const ta = typeof frGetEditor === 'function' ? frGetEditor() : document.getElementById('prose-editor');
      if (ta) pushCustomSnapshot(ta);
      return _origFrReplace.apply(this, arguments);
    };
  }

  const _origFrReplaceAll = window.frReplaceAll;
  if (typeof _origFrReplaceAll === 'function') {
    window.frReplaceAll = function () {
      const ta = typeof frGetEditor === 'function' ? frGetEditor() : document.getElementById('prose-editor');
      if (!ta) return _origFrReplaceAll.apply(this, arguments);

      // 확인 프롬프트 추가 — 대량 변경은 반드시 확인
      const q = document.getElementById('fr-find')?.value || '';
      const r = document.getElementById('fr-replace')?.value || '';
      if (q) {
        const regex = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
        const count = (ta.value.match(regex) || []).length;
        if (count > 1) {
          if (!confirm(`"${q}" → "${r}" 로 ${count}개 모두 바꿉니다.\nCtrl+Z 로 되돌릴 수 있어요. 진행할까요?`)) {
            return;
          }
        }
      }
      pushCustomSnapshot(ta);
      return _origFrReplaceAll.apply(this, arguments);
    };
  }

  // ─── 화 전환 직전 스냅샷 ────────────────────────────────────────
  const _origSelectChapter = window.selectChapter;
  if (typeof _origSelectChapter === 'function') {
    window.selectChapter = function (id) {
      const ta = document.getElementById('prose-editor');
      if (ta && activeChapterId && activeChapterId !== id) {
        pushCustomSnapshot(ta);
      }
      return _origSelectChapter.apply(this, arguments);
    };
  }

  // ─── Ctrl+Z / Ctrl+Shift+Z 인터셉트 ─────────────────────────────
  // 기본적으로 브라우저 native undo 에 맡기되,
  // 브라우저가 "더 되돌릴 게 없음" 상태일 때 커스텀 스택 발동.
  // 판정 방법: undo 실행 전후로 value 가 바뀌었는지 확인.
  window.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    const isUndo = (e.ctrlKey || e.metaKey) && !e.shiftKey && key === 'z';
    const isRedo = (e.ctrlKey || e.metaKey) && (e.shiftKey && key === 'z' || key === 'y');
    if (!isUndo && !isRedo) return;

    const active = document.activeElement;
    const ta = document.getElementById('prose-editor');
    const fe = document.getElementById('focus-editor');
    if (active !== ta && active !== fe) return;

    const target = active;
    const before = target.value;
    const beforeSel = [target.selectionStart, target.selectionEnd];

    // 브라우저 native 에 먼저 기회를 준다 — 다음 tick 에 확인
    setTimeout(() => {
      if (target.value !== before) {
        // native 가 뭔가 되돌렸음. OK.
        return;
      }
      // native 가 아무것도 못 함 → 커스텀 스택 사용
      if (isUndo) {
        const snap = popCustomSnapshot();
        if (!snap) return;
        // 현재 상태는 redo 용으로 보존
        const cid = currentChapterId();
        if (cid) {
          const redoStack = _customRedo.get(cid) || [];
          redoStack.push({
            content: target.value,
            selStart: beforeSel[0],
            selEnd:   beforeSel[1],
            ts: Date.now(),
          });
          while (redoStack.length > CUSTOM_STACK_MAX) redoStack.shift();
          _customRedo.set(cid, redoStack);
        }
        target.value = snap.content;
        target.selectionStart = snap.selStart || 0;
        target.selectionEnd   = snap.selEnd   || 0;
        target.dispatchEvent(new Event('input', { bubbles: true }));
        if (typeof toast === 'function') toast('되돌렸어요 (1단계)');
      } else if (isRedo) {
        const cid = currentChapterId();
        if (!cid) return;
        const redoStack = _customRedo.get(cid) || [];
        const snap = redoStack.pop();
        if (!snap) return;
        pushCustomSnapshot(target);
        target.value = snap.content;
        target.selectionStart = snap.selStart || 0;
        target.selectionEnd   = snap.selEnd   || 0;
        target.dispatchEvent(new Event('input', { bubbles: true }));
        if (typeof toast === 'function') toast('다시 실행했어요');
      }
    }, 0);
  }, false);

  // ─── idle 스냅샷 훅: prose-editor / focus-editor 모두 ────────────
  // 기존 oninput 을 건드리지 않고 capture 리스너로 추가.
  document.addEventListener('input', (e) => {
    const t = e.target;
    if (t && (t.id === 'prose-editor' || t.id === 'focus-editor')) {
      scheduleIdleSnapshot(t);
    }
  }, true);

  // ─── 디버그용 콘솔 API ──────────────────────────────────────────
  window.__undo = {
    getStacks: () => ({
      undo: Object.fromEntries(_customStacks),
      redo: Object.fromEntries(_customRedo),
    }),
    clear: () => { _customStacks.clear(); _customRedo.clear(); },
  };
})();
</script>

<!-- ═══════════════════════════════════════════════════════════════
     TIER 2 — 웹소설 편당 글자수 패치 (v1)
     
     해결하는 문제:
     1) 지금 '1,234자' 밖에 안 보여서 편당 목표 감각이 없음
     2) 공백 포함/제외 구분 없음
     3) 웹소설 표준 편당 5,500자 대비 진행률 시각화 부재
     4) 원고지 매수 표시 부재
     
     접근:
     - 기존 글자수 표시 옆에 ▾ 확장 버튼.
       누르면 팝오버에 공백 제외/원고지/% 게이지/목표 설정 노출
     - 글자수 자체도 목표 대비 색상 변화 (노랑 → 초록 → 주황)
     - 편당 목표는 프로젝트 단위 저장 (p.chapterGoal)
     ═══════════════════════════════════════════════════════════════ -->
<script>
(function ChapterStatsPatch() {
  'use strict';

  const DEFAULT_GOAL = 5500;
  const GENKO_CHARS_PER_SHEET = 200; // 원고지 1장 = 200자

  // ─── 유틸 ───────────────────────────────────────────────────────
  function getGoal() {
    const p = (typeof getProject === 'function') ? getProject() : null;
    return (p && p.chapterGoal) ? p.chapterGoal : DEFAULT_GOAL;
  }

  function setGoal(n) {
    const p = (typeof getProject === 'function') ? getProject() : null;
    if (!p) return;
    p.chapterGoal = n;
    if (typeof autoSave === 'function') autoSave();
  }

  function countStats(text) {
    const all = text.length;
    const noSpace = text.replace(/\s/g, '').length;
    const genko = Math.round(all / GENKO_CHARS_PER_SHEET * 10) / 10;
    return { all, noSpace, genko };
  }

  function goalColor(count, goal) {
    const ratio = count / goal;
    if (ratio < 0.5)  return 'var(--muted)';      // 아직 멀었음
    if (ratio < 0.85) return 'var(--gold2)';      // 진행 중
    if (ratio < 1.15) return 'var(--teal2)';      // 목표 달성
    return 'var(--rust)';                          // 오버
  }

  // ─── 글자수 디스플레이 업그레이드 ───────────────────────────────
  // 기존: <span id="wc-display">1,234자</span>
  // 후: 같은 엘리먼트가 색상 + hover 영역이 되고,
  //     옆에 ▾ 토글 버튼이 붙는다.
  function enhanceWcDisplay() {
    const wc = document.getElementById('wc-display');
    if (!wc || wc._enhanced) return;
    wc._enhanced = true;
    wc.style.cursor = 'pointer';
    wc.style.userSelect = 'none';
    wc.title = '클릭: 상세 통계';
    wc.addEventListener('click', () => toggleStatsPopover(wc));
    applyWcColor(wc);
  }

  function applyWcColor(wc) {
    const ta = document.getElementById('prose-editor');
    if (!ta) return;
    const { all } = countStats(ta.value);
    wc.style.color = goalColor(all, getGoal());
  }

  // ─── 팝오버 ─────────────────────────────────────────────────────
  let _popoverEl = null;

  function toggleStatsPopover(anchor) {
    if (_popoverEl) { closeStatsPopover(); return; }
    openStatsPopover(anchor);
  }

  function closeStatsPopover() {
    if (_popoverEl) { _popoverEl.remove(); _popoverEl = null; }
    document.removeEventListener('click', onOutsideClick, true);
  }

  function onOutsideClick(e) {
    if (!_popoverEl) return;
    if (_popoverEl.contains(e.target)) return;
    if (e.target.id === 'wc-display') return;
    closeStatsPopover();
  }

  function openStatsPopover(anchor) {
    const ta = document.getElementById('prose-editor');
    if (!ta) return;
    const stats = countStats(ta.value);
    const goal  = getGoal();
    const ratio = Math.min(100, Math.round(stats.all / goal * 100));
    const barColor = goalColor(stats.all, goal);

    const rect = anchor.getBoundingClientRect();
    const pop = document.createElement('div');
    pop.id = 'stats-popover';
    pop.style.cssText = `
      position:fixed; top:${rect.bottom + 8}px; left:${rect.left}px;
      min-width:260px; z-index:9000;
      background:var(--paper); border:1px solid var(--border);
      border-radius:10px; padding:14px 16px;
      box-shadow:0 8px 24px var(--shadow);
      font-family:'Noto Sans KR',sans-serif; font-size:12px;
      color:var(--ink);
    `;
    pop.innerHTML = `
      <div style="font-weight:700; font-size:13px; margin-bottom:10px;
        color:var(--ink); display:flex; justify-content:space-between; align-items:center">
        <span>이 화 통계</span>
        <button id="sp-close" style="background:none; border:none; cursor:pointer;
          color:var(--muted); font-size:16px; padding:0 4px; line-height:1">×</button>
      </div>

      <div style="display:grid; grid-template-columns:1fr auto; gap:6px 12px;
        margin-bottom:12px; align-items:center">
        <span style="color:var(--muted)">공백 포함</span>
        <span style="font-weight:700; text-align:right">${stats.all.toLocaleString()}자</span>

        <span style="color:var(--muted)">공백 제외</span>
        <span style="font-weight:700; text-align:right">${stats.noSpace.toLocaleString()}자</span>

        <span style="color:var(--muted)">원고지 (200자)</span>
        <span style="font-weight:700; text-align:right">${stats.genko}장</span>
      </div>

      <div style="font-size:11px; color:var(--muted); margin-bottom:4px;
        display:flex; justify-content:space-between">
        <span>편당 목표 대비</span>
        <span style="color:${barColor}; font-weight:700">${ratio}%</span>
      </div>
      <div style="height:8px; background:var(--cream); border-radius:4px;
        overflow:hidden; margin-bottom:10px">
        <div style="width:${ratio}%; height:100%; background:${barColor};
          transition:width .25s"></div>
      </div>

      <div style="display:flex; align-items:center; gap:6px;
        padding-top:10px; border-top:1px solid var(--border)">
        <label style="font-size:11px; color:var(--muted); flex-shrink:0">목표</label>
        <input id="sp-goal" type="number" value="${goal}" min="500" step="100"
          style="flex:1; padding:4px 8px; font-size:12px;
            border:1px solid var(--border); border-radius:6px;
            background:var(--white); color:var(--ink)">
        <span style="font-size:11px; color:var(--muted)">자</span>
      </div>
      <div style="font-size:10px; color:var(--muted); margin-top:6px; line-height:1.5">
        표준 편당 글자수: 카카오/네이버 5,500자, 문피아 5,000자
      </div>
    `;
    document.body.appendChild(pop);
    _popoverEl = pop;

    // 닫기 버튼
    pop.querySelector('#sp-close').addEventListener('click', closeStatsPopover);

    // 목표 변경
    const goalInput = pop.querySelector('#sp-goal');
    goalInput.addEventListener('change', () => {
      const n = parseInt(goalInput.value);
      if (n && n >= 500) {
        setGoal(n);
        applyWcColor(document.getElementById('wc-display'));
        // 팝오버 다시 그리기
        closeStatsPopover();
        setTimeout(() => openStatsPopover(anchor), 50);
      }
    });

    // 바깥 클릭 시 닫기
    setTimeout(() => {
      document.addEventListener('click', onOutsideClick, true);
    }, 10);

    // 화면 벗어나면 위치 조정
    const popRect = pop.getBoundingClientRect();
    if (popRect.right > window.innerWidth - 10) {
      pop.style.left = (window.innerWidth - popRect.width - 10) + 'px';
    }
    if (popRect.bottom > window.innerHeight - 10) {
      pop.style.top = (rect.top - popRect.height - 8) + 'px';
    }
  }

  // ─── 기존 업데이트 지점에 훅 ─────────────────────────────────────
  // wc-display 요소를 MutationObserver 로 감시.
  // 기존 코드가 textContent 를 덮어쓰면 색상 재적용 + enhancer 재실행.
  function installObserver() {
    const wc = document.getElementById('wc-display');
    if (!wc) return;
    enhanceWcDisplay();

    const obs = new MutationObserver(() => {
      enhanceWcDisplay();
      applyWcColor(wc);
    });
    obs.observe(wc, { childList: true, characterData: true, subtree: true });
  }

  // ─── renderChapters 가 호출되면 새 wc-display 가 생기므로 재설치 ─
  const _origRenderChapters = window.renderChapters;
  if (typeof _origRenderChapters === 'function') {
    window.renderChapters = function () {
      closeStatsPopover();
      const ret = _origRenderChapters.apply(this, arguments);
      setTimeout(installObserver, 50);
      return ret;
    };
  }

  // ─── 집중 모드 글자수도 비슷하게 ────────────────────────────────
  const _origUpdateFocusWc = window.updateFocusWordCount;
  if (typeof _origUpdateFocusWc === 'function') {
    window.updateFocusWordCount = function () {
      _origUpdateFocusWc.apply(this, arguments);
      const fe = document.getElementById('focus-editor');
      const wc = document.getElementById('focus-wordcount');
      if (!fe || !wc) return;
      const stats = countStats(fe.value);
      const goal = getGoal();
      const ratio = Math.min(100, Math.round(stats.all / goal * 100));
      wc.style.color = goalColor(stats.all, goal);
      wc.title = `공백포함 ${stats.all.toLocaleString()}자 · 공백제외 ${stats.noSpace.toLocaleString()}자 · 목표 대비 ${ratio}%`;
    };
  }

  // ─── 초기 설치 (페이지 로드 직후 이미 집필 탭이면) ───────────────
  setTimeout(installObserver, 200);
})();
</script>

<!-- ═══════════════════════════════════════════════════════════════
     TIER 0-5 — 삭제 휴지통 패치 (v1)
     
     화 / 작품 삭제 시 바로 지우는 게 아니라
     '되돌리기' 토스트를 10초간 표시.
     그 사이 되돌리기 클릭 시 복원.
     시간 지나면 진짜 삭제.
     
     구현 원칙:
     - 원본 deleteChapter / deleteProject 를 덮어씀
     - 다른 삭제 (캐릭터/세계관 등)는 confirm 만으로 충분하므로 건드리지 않음
     ═══════════════════════════════════════════════════════════════ -->
<script>
(function TrashPatch() {
  'use strict';

  const UNDO_WINDOW_MS = 10000; // 10초

  // ─── Undo 토스트 UI ─────────────────────────────────────────────
  // 오른쪽 하단에 쌓이는 카드. 10초 카운트다운 프로그레스 바.
  let _trashStack = []; // {id, label, timer, el, undoFn, commitFn}

  function ensureContainer() {
    let c = document.getElementById('trash-toast-container');
    if (!c) {
      c = document.createElement('div');
      c.id = 'trash-toast-container';
      c.style.cssText = `
        position:fixed; right:16px; bottom:16px; z-index:10000;
        display:flex; flex-direction:column; gap:8px;
        pointer-events:none;
      `;
      document.body.appendChild(c);
    }
    return c;
  }

  function showUndoToast(label, undoFn, commitFn) {
    const id = Date.now() + Math.random();
    const container = ensureContainer();

    const el = document.createElement('div');
    el.style.cssText = `
      pointer-events:auto; min-width:280px; max-width:360px;
      background:#18120a; color:#fff; border-radius:12px;
      padding:12px 14px; box-shadow:0 8px 24px rgba(0,0,0,.3);
      font-family:'Noto Sans KR',sans-serif; font-size:13px;
      display:flex; align-items:center; gap:10px;
      animation:slideInTrash .25s ease;
      position:relative; overflow:hidden;
    `;
    el.innerHTML = `
      <style>
        @keyframes slideInTrash { from { transform:translateX(20px); opacity:0 } to { transform:translateX(0); opacity:1 } }
        @keyframes trashProgress { from { width:100% } to { width:0% } }
      </style>
      <span style="font-size:16px; flex-shrink:0">🗑️</span>
      <span style="flex:1; line-height:1.4">${label}</span>
      <button style="background:var(--gold); color:#fff; border:none;
        border-radius:6px; padding:6px 12px; font-size:12px; font-weight:700;
        cursor:pointer; font-family:'Noto Sans KR',sans-serif;
        flex-shrink:0">되돌리기</button>
      <div style="position:absolute; bottom:0; left:0; height:2px;
        background:var(--gold);
        animation:trashProgress ${UNDO_WINDOW_MS}ms linear forwards"></div>
    `;
    const btn = el.querySelector('button');

    const entry = { id, label, el, undoFn, commitFn, committed: false };

    btn.addEventListener('click', () => {
      // 되돌리기
      entry.committed = true; // commit 안 되게 표시
      clearTimeout(entry.timer);
      try { undoFn(); } catch(e) {}
      removeToast(entry);
      if (typeof toast === 'function') toast('되돌렸어요');
    });

    entry.timer = setTimeout(() => {
      // 시간 만료 → 진짜 삭제 commit
      if (entry.committed) return;
      entry.committed = true;
      try { commitFn(); } catch(e) {}
      removeToast(entry);
    }, UNDO_WINDOW_MS);

    container.appendChild(el);
    _trashStack.push(entry);
  }

  function removeToast(entry) {
    if (!entry.el) return;
    entry.el.style.transition = 'opacity .2s, transform .2s';
    entry.el.style.opacity = '0';
    entry.el.style.transform = 'translateX(20px)';
    setTimeout(() => {
      entry.el?.remove();
      entry.el = null;
      _trashStack = _trashStack.filter(e => e.id !== entry.id);
    }, 200);
  }

  // ─── deleteChapter 덮어쓰기 ─────────────────────────────────────
  const _origDeleteChapter = window.deleteChapter;
  window.deleteChapter = function (id) {
    const p = getProject();
    if (!p) return;
    const idx = p.chapters.findIndex(c => c.id === id);
    if (idx === -1) return;

    const chapter = p.chapters[idx];
    const snapshot = JSON.parse(JSON.stringify(chapter));
    const wasActive = (activeChapterId === id);
    const projId = p.id;

    // 즉시 UI 에서 제거 (화면은 이미 사라진 것처럼)
    p.chapters.splice(idx, 1);
    if (wasActive) activeChapterId = p.chapters[0]?.id || null;
    autoSave();
    if (typeof renderChapters === 'function') renderChapters();

    showUndoToast(
      `"${chapter.title || '제목 없음'}" 삭제됨`,
      // undo
      () => {
        const proj = state.projects.find(pp => pp.id === projId);
        if (!proj) return;
        // 같은 자리에 복원 (idx 가 유효하지 않을 수 있음 → clamp)
        const insertAt = Math.min(idx, proj.chapters.length);
        proj.chapters.splice(insertAt, 0, snapshot);
        if (wasActive) activeChapterId = snapshot.id;
        autoSave();
        if (typeof renderChapters === 'function') renderChapters();
      },
      // commit — 영구 삭제 확정 시점. 고아 참조 정리.
      () => {
        const proj = state.projects.find(pp => pp.id === projId);
        if (!proj) return;
        // 사건 일지에서 이 회차를 참조하던 chapterId 비움
        let cleaned = 0;
        (proj.chronicles || []).forEach(ev => {
          if (ev.chapterId === id) { ev.chapterId = ''; cleaned++; }
        });
        if (cleaned > 0) autoSave();
      }
    );
  };

  // ─── deleteProject 덮어쓰기 ─────────────────────────────────────
  // 원본은 confirmDialog 를 이미 쓰고 있음. confirmDialog 은 건드리지 않고
  // 내부 로직만 교체: 삭제 즉시 휴지통으로 이동.
  const _origDeleteProject = window.deleteProject;
  window.deleteProject = function (id) {
    const idx = state.projects.findIndex(p => p.id === id);
    if (idx === -1) return;

    // 원본은 confirmDialog 로 물어보니 우리도 그 UX 유지
    if (typeof confirmDialog === 'function') {
      confirmDialog('이 작품을 삭제합니다. 10초 내에 되돌릴 수 있어요.', () => {
        performDeleteProject(id);
      });
    } else {
      if (!confirm('이 작품을 삭제합니다. 10초 내에 되돌릴 수 있어요.')) return;
      performDeleteProject(id);
    }
  };

  const _origDeleteProjectByIndex = window.deleteProjectByIndex;
  window.deleteProjectByIndex = function (idx) {
    const proj = state.projects[idx];
    if (!proj) return;
    if (typeof confirmDialog === 'function') {
      confirmDialog('이 작품을 삭제합니다. 10초 내에 되돌릴 수 있어요.', () => {
        performDeleteProject(proj.id);
      });
    } else {
      if (!confirm('이 작품을 삭제합니다. 10초 내에 되돌릴 수 있어요.')) return;
      performDeleteProject(proj.id);
    }
  };

  function performDeleteProject(id) {
    const idx = state.projects.findIndex(p => p.id === id);
    if (idx === -1) return;
    const proj = state.projects[idx];
    const snapshot = JSON.parse(JSON.stringify(proj));

    state.projects.splice(idx, 1);
    // 활성 프로젝트가 지워지면 홈으로
    if (state.activeProjectId === id) {
      state.activeProjectId = null;
      if (typeof goHome === 'function') goHome();
    } else {
      if (typeof renderHome === 'function') renderHome();
    }
    saveToStorage();

    showUndoToast(
      `"${proj.title || '작품'}" 삭제됨`,
      () => {
        // 원위치 복원
        const insertAt = Math.min(idx, state.projects.length);
        state.projects.splice(insertAt, 0, snapshot);
        saveToStorage();
        if (typeof renderHome === 'function') renderHome();
      },
      () => {}
    );
  }

  // ─── 페이지 나갈 때 미결 commit 강제 실행 ───────────────────────
  // 복원 창이 열려있는 상태로 탭 닫히면 진짜 삭제가 아직 안 된
  // '지워진 듯 안 지워진' 상태 — 이미 state 에선 빠져있고
  // saveToStorage 도 호출됐으니 실질 문제 없음. 토스트만 정리.
  window.addEventListener('pagehide', () => {
    _trashStack.forEach(e => {
      if (!e.committed) { try { e.commitFn(); } catch(err) {} }
    });
    _trashStack = [];
  });
})();
</script>

<!-- ═══════════════════════════════════════════════════════════════
     TIER 2-12 — 플랫폼별 Export 패치 (v1)
     
     원고 설정 탭 하단에 '내보내기' 섹션 추가.
     플랫폼별 줄바꿈 규칙 적용 후:
     - 현재 화만 / 전체 화 선택
     - 클립보드 복사 또는 txt 다운로드
     
     플랫폼별 규칙 (일반적 관행):
     - 문피아: 문단 사이 빈 줄 1개 (\n\n)
     - 카카오페이지: 문단 사이 빈 줄 2개 (\n\n\n)
     - 네이버 시리즈: 문단 사이 빈 줄 1개 (\n\n)
     - 조아라: 문단 사이 빈 줄 1개 (\n\n)
     - 리디: 원본 유지
     ═══════════════════════════════════════════════════════════════ -->
<script>
(function PlatformExportPatch() {
  'use strict';

  // 플랫폼별 문단 구분자
  const PLATFORM_RULES = {
    kakao:  { paragraphSep: '\n\n\n', name: '카카오페이지', note: '문단 사이 빈 줄 2개' },
    naver:  { paragraphSep: '\n\n',   name: '네이버 시리즈', note: '문단 사이 빈 줄 1개' },
    munpia: { paragraphSep: '\n\n',   name: '문피아',       note: '문단 사이 빈 줄 1개' },
    joara:  { paragraphSep: '\n\n',   name: '조아라',       note: '문단 사이 빈 줄 1개' },
    ridi:   { paragraphSep: '\n',     name: '리디',         note: '원본 유지' },
    custom: { paragraphSep: '\n\n',   name: '직접 설정',    note: '기본(문단 사이 빈 줄 1개)' },
  };

  // 본문을 플랫폼 규칙에 맞게 변환
  function convertText(raw, rule) {
    // 1) 모든 줄바꿈 정규화
    const normalized = raw.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    // 2) 연속된 빈 줄을 "하나의 문단 경계"로 취급 → 단일 \n\n 로 축약
    const paragraphs = normalized.split(/\n\s*\n+/).map(p => p.trim()).filter(p => p.length);
    // 3) 플랫폼 구분자로 다시 결합
    return paragraphs.join(rule.paragraphSep);
  }

  // 클립보드 복사
  async function copyToClipboard(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      try {
        await navigator.clipboard.writeText(text);
        return true;
      } catch (e) { /* 권한 문제 → 폴백 */ }
    }
    // 폴백: textarea + execCommand
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      return ok;
    } catch (e) { return false; }
  }

  // txt 다운로드
  function downloadTxt(text, filename) {
    const blob = new Blob(['\ufeff' + text], { type: 'text/plain;charset=utf-8' }); // BOM 포함
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  }

  // 내보낼 텍스트 구성
  function buildExportText(project, scope, currentIdx, rule) {
    const chapters = project.chapters || [];
    if (chapters.length === 0) return '';

    let targets = [];
    if (scope === 'current') {
      if (currentIdx != null && chapters[currentIdx]) targets = [chapters[currentIdx]];
      else targets = chapters.slice(0, 1);
    } else if (scope === 'all') {
      targets = chapters;
    }

    const parts = targets.map(ch => {
      const title = ch.title || '제목 없음';
      const body = convertText(ch.content || '', rule);
      if (scope === 'all') {
        // 화 사이에 제목 헤더 삽입
        return `[${title}]\n\n${body}`;
      }
      return body;
    });

    // 화 사이는 넉넉한 공백
    const chapterSep = scope === 'all' ? '\n\n\n' : '\n\n';
    return parts.join(chapterSep);
  }

  // ─── UI 삽입 ───────────────────────────────────────────────────
  // renderManuscript 가 호출된 다음 카드 하나 append.
  const _origRenderManuscript = window.renderManuscript;
  if (typeof _origRenderManuscript === 'function') {
    window.renderManuscript = function () {
      const ret = _origRenderManuscript.apply(this, arguments);
      setTimeout(injectExportCard, 0);
      return ret;
    };
  }

  function injectExportCard() {
    const main = document.getElementById('main');
    if (!main) return;
    // 이미 있으면 재삽입 안 함
    if (main.querySelector('#ms-export-card')) return;

    const wrap = main.querySelector('[style*="max-width:900px"]');
    if (!wrap) return;

    const p = (typeof getProject === 'function') ? getProject() : null;
    if (!p) return;
    const chapters = p.chapters || [];

    const card = document.createElement('div');
    card.id = 'ms-export-card';
    card.className = 'card';
    card.style.marginBottom = '16px';
    card.innerHTML = `
      <div class="sec-title">플랫폼별 내보내기</div>
      <div style="font-size:11px; color:var(--muted); margin-bottom:12px; line-height:1.6">
        플랫폼에 맞는 줄바꿈 규칙을 적용해 본문을 내보냅니다.
        ${chapters.length === 0 ? '<br><span style="color:var(--rust)">⚠️ 아직 화가 없어요.</span>' : ''}
      </div>

      <div class="form-grid" style="margin-bottom:14px">
        <div>
          <label class="label">플랫폼</label>
          <select id="ex-platform" style="width:100%">
            ${Object.entries(PLATFORM_RULES).map(([k, v]) =>
              `<option value="${k}">${v.name}</option>`
            ).join('')}
          </select>
        </div>
        <div>
          <label class="label">범위</label>
          <select id="ex-scope" style="width:100%">
            <option value="current">현재 선택 화만</option>
            <option value="all">전체 화 (합본)</option>
          </select>
        </div>
        <div style="grid-column:span 2">
          <label class="label">화 선택 (현재 화 모드일 때)</label>
          <select id="ex-chapter" style="width:100%" ${chapters.length === 0 ? 'disabled' : ''}>
            ${chapters.length === 0
              ? '<option>화 없음</option>'
              : chapters.map((c, i) => `<option value="${i}">${(i+1).toString().padStart(2,'0')}. ${c.title || '제목 없음'} (${(c.content||'').length.toLocaleString()}자)</option>`).join('')}
          </select>
        </div>
      </div>

      <div id="ex-preview-wrap" style="margin-bottom:14px">
        <label class="label" style="display:flex; justify-content:space-between; align-items:center">
          <span>미리보기</span>
          <span id="ex-stat" style="font-size:11px; color:var(--muted); font-weight:400"></span>
        </label>
        <textarea id="ex-preview" readonly rows="10"
          style="width:100%; font-family:'Noto Serif KR',serif; font-size:13px;
            line-height:1.7; padding:10px; background:var(--cream);
            border:1px solid var(--border); border-radius:8px;
            color:var(--ink); resize:vertical"></textarea>
        <div style="font-size:10px; color:var(--muted); margin-top:4px" id="ex-rule-note"></div>
      </div>

      <div style="display:flex; gap:8px; flex-wrap:wrap">
        <button class="btn btn-gold" id="ex-copy" ${chapters.length === 0 ? 'disabled' : ''}
          style="flex:1; min-width:140px">
          📋 클립보드 복사
        </button>
        <button class="btn btn-outline" id="ex-download" ${chapters.length === 0 ? 'disabled' : ''}
          style="flex:1; min-width:140px">
          📄 .txt 다운로드
        </button>
      </div>
    `;

    wrap.appendChild(card);

    // ─── 이벤트 바인딩 ──────────────────────────────────────────
    const selPlatform = card.querySelector('#ex-platform');
    const selScope    = card.querySelector('#ex-scope');
    const selChapter  = card.querySelector('#ex-chapter');
    const preview     = card.querySelector('#ex-preview');
    const stat        = card.querySelector('#ex-stat');
    const ruleNote    = card.querySelector('#ex-rule-note');
    const btnCopy     = card.querySelector('#ex-copy');
    const btnDownload = card.querySelector('#ex-download');

    // 현재 작품에 저장된 플랫폼 프리셋 기본 선택
    const cfg = (typeof getMsConfig === 'function') ? getMsConfig(p) : null;
    if (cfg && cfg.presetId && PLATFORM_RULES[cfg.presetId]) {
      selPlatform.value = cfg.presetId;
    }

    function refreshPreview() {
      const platform = selPlatform.value;
      const rule = PLATFORM_RULES[platform];
      const scope = selScope.value;
      const idx = parseInt(selChapter.value) || 0;

      selChapter.disabled = (scope !== 'current' || chapters.length === 0);

      const text = buildExportText(p, scope, idx, rule);
      preview.value = text.length > 2000
        ? text.slice(0, 2000) + '\n\n... (총 ' + text.length.toLocaleString() + '자, 이하 생략)'
        : text;
      stat.textContent = text.length === 0
        ? ''
        : `${text.length.toLocaleString()}자 / 문단 ${text.split(rule.paragraphSep).length}개`;
      ruleNote.textContent = `규칙: ${rule.note}`;
    }

    selPlatform.addEventListener('change', refreshPreview);
    selScope.addEventListener('change', refreshPreview);
    selChapter.addEventListener('change', refreshPreview);

    btnCopy.addEventListener('click', async () => {
      const rule = PLATFORM_RULES[selPlatform.value];
      const scope = selScope.value;
      const idx = parseInt(selChapter.value) || 0;
      const text = buildExportText(p, scope, idx, rule);
      if (!text) {
        if (typeof toast === 'function') toast('내보낼 내용이 없어요.');
        return;
      }
      const ok = await copyToClipboard(text);
      if (typeof toast === 'function') {
        toast(ok ? `클립보드에 복사됨 (${text.length.toLocaleString()}자) 📋` : '복사 실패 — 권한을 확인해주세요');
      }
    });

    btnDownload.addEventListener('click', () => {
      const rule = PLATFORM_RULES[selPlatform.value];
      const scope = selScope.value;
      const idx = parseInt(selChapter.value) || 0;
      const text = buildExportText(p, scope, idx, rule);
      if (!text) {
        if (typeof toast === 'function') toast('내보낼 내용이 없어요.');
        return;
      }
      const date = new Date().toISOString().slice(0, 10);
      let filename;
      if (scope === 'current') {
        const ch = chapters[idx];
        filename = `${(p.title||'작품')}_${(ch?.title||'화')}_${rule.name}_${date}.txt`;
      } else {
        filename = `${(p.title||'작품')}_전체_${rule.name}_${date}.txt`;
      }
      downloadTxt(text, filename);
      if (typeof toast === 'function') toast(`${rule.name} 형식으로 내보냄 📄`);
    });

    refreshPreview();
  }
})();
</script>

<!-- ═══════════════════════════════════════════════════════════════
     보조 패치 (v1)
     
     1) Ctrl+S / Cmd+S → 경고 대신 실제 파일 저장 실행
        (브라우저 '페이지 저장' 기본 동작은 preventDefault)
     2) 스냅샷 복원 UI — 지금은 콘솔에서만 가능한 것을
        홈 화면에 '이전 버전 보기' 버튼 하나 추가해서 모달로.
     ═══════════════════════════════════════════════════════════════ -->
<script>
(function AuxPatch() {
  'use strict';

  // ─── 1. Ctrl+S 실제 저장 ───────────────────────────────────────
  // 원본의 showCtrlSWarning 을 덮어씀. preventDefault 로 브라우저
  // 기본 동작 차단 + exportCurrentProject 호출.
  window.showCtrlSWarning = function () {
    // 이 함수는 원본에서 Ctrl+S 감지 시 호출됨
    // 호출 타이밍에 activeElement 가 textarea 면 입력 흐름 방해 안 되게
    // 그냥 저장만 조용히 실행.
    if (typeof exportCurrentProject === 'function' && state.activeProjectId) {
      exportCurrentProject();
    } else if (typeof toast === 'function') {
      toast('작품을 열고 사용해주세요');
    }
  };

  // 원본 keydown 리스너가 이미 capture 로 돌고 있어서
  // preventDefault 를 우리가 다시 해줘야 브라우저 기본 동작 차단됨.
  window.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S')) {
      e.preventDefault();
      e.stopPropagation();
      // showCtrlSWarning 은 원본이 호출하지만, 우리가 덮어썼으니 OK
    }
  }, true);

  // ─── 2. 스냅샷 복원 UI ─────────────────────────────────────────
  // data safety 패치가 listSnapshots / restoreSnapshot 을 window 에 노출함.
  // 둘 다 존재할 때만 UI 작동.
  async function openSnapshotModal() {
    if (typeof window.listSnapshots !== 'function') {
      alert('스냅샷 기능이 활성화되지 않았어요.');
      return;
    }
    const snapshots = await window.listSnapshots();

    const backdrop = document.createElement('div');
    backdrop.style.cssText = `
      position:fixed; inset:0; background:rgba(0,0,0,.5);
      z-index:10001; display:flex; align-items:center; justify-content:center;
      padding:20px;
    `;
    backdrop.addEventListener('click', (e) => {
      if (e.target === backdrop) backdrop.remove();
    });

    const modal = document.createElement('div');
    modal.style.cssText = `
      background:var(--paper); border-radius:14px;
      max-width:560px; width:100%; max-height:80vh;
      display:flex; flex-direction:column;
      box-shadow:0 12px 40px rgba(0,0,0,.3);
      font-family:'Noto Sans KR',sans-serif;
    `;
    modal.innerHTML = `
      <div style="padding:18px 20px; border-bottom:1px solid var(--border);
        display:flex; justify-content:space-between; align-items:center; flex-shrink:0">
        <div>
          <div style="font-weight:700; font-size:16px; color:var(--ink)">자동 스냅샷</div>
          <div style="font-size:11px; color:var(--muted); margin-top:2px">
            15분마다 · 탭 닫을 때마다 저장 · 최근 20개 보관
          </div>
        </div>
        <button id="snap-close" style="background:none; border:none; font-size:22px;
          color:var(--muted); cursor:pointer; padding:0 4px; line-height:1">×</button>
      </div>
      <div id="snap-list" style="flex:1; overflow-y:auto; padding:10px 14px">
        ${snapshots.length === 0
          ? '<div style="text-align:center; padding:40px 0; color:var(--muted); font-size:13px">아직 저장된 스냅샷이 없어요.<br><span style="font-size:11px">앱 사용 중 15분 이상 지나면 자동으로 생성됩니다.</span></div>'
          : snapshots.map(s => `
            <div class="snap-row" data-ts="${s.ts}" style="
              padding:12px 14px; margin-bottom:6px;
              background:var(--cream); border:1px solid var(--border);
              border-radius:8px;
              display:flex; justify-content:space-between; align-items:center;
              gap:12px;">
              <div style="flex:1; min-width:0">
                <div style="font-weight:700; font-size:13px; color:var(--ink)">
                  ${s.when}
                </div>
                <div style="font-size:11px; color:var(--muted); margin-top:2px">
                  ${s.reason === 'interval' ? '정기 저장' :
                    s.reason === 'pagehide' ? '앱 종료 시' :
                    s.reason === 'initial' ? '앱 시작 시' :
                    s.reason === 'before-restore' ? '복원 직전 자동' : s.reason}
                  · 작품 ${s.projectCount}개
                </div>
              </div>
              <button class="btn btn-outline btn-sm snap-restore"
                data-ts="${s.ts}" style="flex-shrink:0; font-size:11px">복원</button>
            </div>
          `).join('')}
      </div>
      <div style="padding:12px 20px; border-top:1px solid var(--border);
        font-size:11px; color:var(--muted); line-height:1.6; flex-shrink:0">
        💡 복원 시 현재 데이터는 별도의 '복원 직전' 스냅샷으로 자동 저장돼요.<br>
        잘못 복원했을 때 이 창에서 다시 되돌릴 수 있어요.
      </div>
    `;

    backdrop.appendChild(modal);
    document.body.appendChild(backdrop);

    modal.querySelector('#snap-close').addEventListener('click', () => backdrop.remove());

    modal.querySelectorAll('.snap-restore').forEach(btn => {
      btn.addEventListener('click', async () => {
        const ts = parseInt(btn.dataset.ts);
        if (!ts) return;
        backdrop.remove();
        // restoreSnapshot 이 내부적으로 confirm + reload 하므로 그냥 호출
        await window.restoreSnapshot(ts);
      });
    });
  }

  // ─── 홈 화면에 버튼 추가 ───────────────────────────────────────
  // renderHome 이 매번 innerHTML 을 갈아끼우니, 렌더 후 후킹.
  const _origRenderHome = window.renderHome;
  if (typeof _origRenderHome === 'function') {
    window.renderHome = function () {
      const ret = _origRenderHome.apply(this, arguments);
      setTimeout(injectSnapshotButton, 0);
      return ret;
    };
  }

  function injectSnapshotButton() {
    const main = document.getElementById('main');
    if (!main) return;
    if (main.querySelector('#snap-open-btn')) return;

    // 홈 상단 어딘가에 눈에 띄지 않게 삽입 — 작은 텍스트 링크 스타일
    // 작품 목록 위 / 제목 근처에 붙임
    const titleEl = main.querySelector('h1, .font-display');
    if (!titleEl) return;

    const btn = document.createElement('button');
    btn.id = 'snap-open-btn';
    btn.style.cssText = `
      background:none; border:1px solid var(--border); color:var(--muted);
      padding:6px 12px; border-radius:7px; cursor:pointer;
      font-size:11px; font-family:'Noto Sans KR',sans-serif;
      margin-left:12px; vertical-align:middle;
      transition:all .15s;
    `;
    btn.innerHTML = '🕐 이전 버전 보기';
    btn.addEventListener('mouseenter', () => {
      btn.style.borderColor = 'var(--gold)';
      btn.style.color = 'var(--gold)';
    });
    btn.addEventListener('mouseleave', () => {
      btn.style.borderColor = 'var(--border)';
      btn.style.color = 'var(--muted)';
    });
    btn.addEventListener('click', openSnapshotModal);

    // 제목 옆에 인라인으로
    titleEl.appendChild(btn);
  }
})();
</script>

<!-- ═══════════════════════════════════════════════════════════════
     모바일 헤더 가시성 패치 (v1)
     
     문제: 520px 이하에서 💾 저장 버튼이 너무 작고 다른 버튼에 묻힘.
     저장 인디케이터("저장됨 · N초 전")까지 추가되며 더 붐빔.
     
     해결:
     1) 💾 저장 버튼을 모바일에서 명확하게 크고 눈에 띄게
     2) "저장됨" 인디케이터를 모바일에선 저장 버튼에 점으로 통합
        (독립 텍스트 제거, 저장 상태는 버튼 상단에 작은 초록 점으로)
     3) 테마 🎨 버튼은 모바일에서 숨김 (잘 쓰지 않는 장식적 기능)
     4) 불러오기 📂 버튼도 집필 중일 땐 숨김 (집필 편집기 탭에 들어있으니)
     ═══════════════════════════════════════════════════════════════ -->
<script>
(function MobileHeaderFix() {
  'use strict';

  // ─── CSS 주입 ───────────────────────────────────────────────────
  const style = document.createElement('style');
  style.textContent = `
    /* 모바일 저장 버튼 강조 */
    @media (max-width: 520px) {
      #btn-save-project {
        padding: 7px 11px !important;
        font-size: 18px !important;
        background: var(--gold) !important;
        box-shadow: 0 2px 6px rgba(196, 146, 42, .35);
        position: relative;
      }
      #btn-save-project:active {
        transform: scale(0.95);
      }
      /* 저장 인디케이터 텍스트는 모바일에선 숨김 — 점으로 대체 */
      #save-indicator {
        display: none !important;
      }
      /* 테마 색상 버튼 유지 — 크기만 조정 */
      #btn-theme {
        font-size: 13px !important;
        padding: 5px 6px !important;
      }
      /* 다크모드 버튼은 작게 유지 */
      #btn-darkmode {
        font-size: 13px !important;
        padding: 5px 6px !important;
      }
      /* 파일 상태 🔗 아이콘도 작게 */
      #file-status {
        margin-right: 2px !important;
      }
      #file-status span {
        font-size: 10px !important;
      }
    }

    /* 저장됨 점 애니메이션 (모바일 저장 버튼 우상단) */
    #save-dot {
      position: absolute;
      top: 3px;
      right: 3px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #2ecc71;
      box-shadow: 0 0 0 2px var(--gold);
      pointer-events: none;
      opacity: 0;
      transition: opacity .3s;
    }
    #save-dot.on {
      opacity: 1;
    }
    #save-dot.saving {
      background: #f39c12;
      animation: saveDotPulse 0.6s ease-in-out infinite;
    }
    @keyframes saveDotPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }
  `;
  document.head.appendChild(style);

  // ─── 저장 버튼에 점 추가 ────────────────────────────────────────
  function injectSaveDot() {
    const btn = document.getElementById('btn-save-project');
    if (!btn) return;
    if (btn.querySelector('#save-dot')) return;
    const dot = document.createElement('span');
    dot.id = 'save-dot';
    btn.appendChild(dot);
  }

  // 최초 시도 + 혹시 DOM이 아직 없으면 재시도
  setTimeout(injectSaveDot, 100);
  setTimeout(injectSaveDot, 500);

  // ─── 저장 상태에 따라 점 토글 ──────────────────────────────────
  // autoSave 가 호출되면 잠깐 saving(주황) → 잠시 후 on(초록)
  let _dotTimer = null;
  const _origAutoSave = window.autoSave;
  window.autoSave = function () {
    const dot = document.getElementById('save-dot');
    if (dot) {
      dot.classList.remove('on');
      dot.classList.add('saving');
    }
    _origAutoSave.apply(this, arguments);
    clearTimeout(_dotTimer);
    _dotTimer = setTimeout(() => {
      const d = document.getElementById('save-dot');
      if (d) {
        d.classList.remove('saving');
        d.classList.add('on');
      }
    }, 400);
  };

  // ─── 저장 버튼에 길게 누르기 힌트 (모바일) ─────────────────────
  // 저장 성공 시 토스트로 "저장됨 · N초 전" 확인 가능.
  // 버튼에 aria-label 보강해 스크린리더도 지원.
  setTimeout(() => {
    const btn = document.getElementById('btn-save-project');
    if (btn) {
      btn.setAttribute('aria-label', '현재 작품을 파일에 저장');
    }
  }, 200);
})();
</script>

<!-- ═══════════════════════════════════════════════════════════════
     TIER 뽀모-1 — 타이머 정확도 · 알림 · 영속화 패치 (v1)
     
     해결:
     1) 백그라운드 탭에서 setInterval throttle로 시간이 느려지던 문제
        → Date.now 기반 endAt 계산. 매 tick, visibilitychange 마다 재동기화
     2) 세션 완료를 탭 안 보고 있으면 놓치던 문제
        → Notification API 로 OS 레벨 알림
     3) 새로고침 시 타이머/카운트 전부 날아가던 문제
        → localStorage 에 상태 + 오늘의 완료 횟수 저장
     ═══════════════════════════════════════════════════════════════ -->
<script>
(function PomodoroTier1() {
  'use strict';

  const STORAGE_STATE = 'wnstudio_pomo_state';
  const STORAGE_DAILY = 'wnstudio_pomo_daily';

  // ─── 유틸 ───────────────────────────────────────────────────────
  function todayStr() {
    return new Date().toISOString().slice(0, 10);
  }

  function saveState() {
    try {
      const s = window.pomoState;
      if (!s) return;
      const saved = {
        running: s.running,
        mode: s.mode,
        endAt: s.endAt,          // 타이머 끝날 절대 시각 (ms)
        remaining: s.remaining,  // 일시정지 시 사용
        total: s.total,
        session: s.session,
        goal: s.goal,
        completedWork: s.completedWork,
        startChars: s.startChars,
        savedAt: Date.now(),
      };
      localStorage.setItem(STORAGE_STATE, JSON.stringify(saved));
    } catch(e) {}
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_STATE);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch(e) { return null; }
  }

  function clearState() {
    try { localStorage.removeItem(STORAGE_STATE); } catch(e) {}
  }

  function loadDaily() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_DAILY) || '{}');
    } catch(e) { return {}; }
  }

  function saveDaily(d) {
    try { localStorage.setItem(STORAGE_DAILY, JSON.stringify(d)); } catch(e) {}
  }

  function incDaily() {
    const d = loadDaily();
    const t = todayStr();
    d[t] = (d[t] || 0) + 1;
    saveDaily(d);
    return d[t];
  }

  function getTodayCount() {
    return loadDaily()[todayStr()] || 0;
  }

  // ─── Notification 권한 ──────────────────────────────────────────
  let _notifChecked = false;

  async function requestNotifPermission() {
    if (_notifChecked) return;
    _notifChecked = true;
    if (!('Notification' in window)) return;
    if (Notification.permission === 'default') {
      try { await Notification.requestPermission(); } catch(e) {}
    }
  }

  function showNotif(title, body) {
    if (!('Notification' in window)) return;
    if (Notification.permission !== 'granted') return;
    try {
      const n = new Notification(title, {
        body,
        icon: './icons/icon-192.png',
        badge: './icons/icon-192.png',
        silent: false,
        tag: 'hopil-pomo',      // 중복 알림 덮어쓰기
        requireInteraction: false,
      });
      n.onclick = () => {
        window.focus();
        n.close();
      };
      setTimeout(() => { try { n.close(); } catch(e) {} }, 8000);
    } catch(e) {}
  }

  // ─── pomoToggle 덮어쓰기 ────────────────────────────────────────
  // 시작 시 endAt = now + remaining*1000. 일시정지 시 remaining 저장.
  const _origPomoToggle = window.pomoToggle;
  window.pomoToggle = function () {
    if (!window.pomoState) return;

    if (pomoState.running) {
      // 일시정지 — 현재 남은 시간 계산해서 저장
      const now = Date.now();
      if (pomoState.endAt) {
        pomoState.remaining = Math.max(0, Math.ceil((pomoState.endAt - now) / 1000));
      }
      clearInterval(pomoState.timer);
      pomoState.running = false;
      pomoState.endAt = null;
      const btn = document.getElementById('pomo-playpause');
      if (btn) btn.textContent = '▶';
    } else {
      // 시작 — endAt 설정
      if (pomoState.mode === 'work' && pomoState.remaining === (typeof POMO_WORK !== 'undefined' ? POMO_WORK : 1500)) {
        const editor = document.getElementById('prose-editor') || document.getElementById('focus-editor');
        pomoState.startChars = editor ? editor.value.length : 0;
        if (typeof resetSessionTyping === 'function') resetSessionTyping();
      }
      pomoState.running = true;
      pomoState.endAt = Date.now() + pomoState.remaining * 1000;
      const btn = document.getElementById('pomo-playpause');
      if (btn) btn.textContent = 'II';
      pomoState.timer = setInterval(pomoTick, 1000);

      // 첫 시작에서 Notification 권한 요청
      requestNotifPermission();
    }
    saveState();
  };

  // ─── pomoTick 덮어쓰기 — Date.now 기반 ─────────────────────────
  const _origPomoTick = window.pomoTick;
  window.pomoTick = function () {
    if (!window.pomoState) return;
    if (!pomoState.running) return;

    const now = Date.now();
    const rem = Math.max(0, Math.ceil((pomoState.endAt - now) / 1000));
    pomoState.remaining = rem;

    if (rem <= 0) {
      pomoComplete();
      return;
    }
    if (typeof pomoUpdateDisplay === 'function') pomoUpdateDisplay();
    updateTabTitle();

    // 10초마다 persist (매초 쓰면 과도)
    if (rem % 10 === 0) saveState();
  };

  // ─── pomoComplete 덮어쓰기 ──────────────────────────────────────
  // 원본을 그대로 호출하되 그 전에 알림·기록·상태정리 후처리.
  const _origPomoComplete = window.pomoComplete;
  window.pomoComplete = function () {
    if (!window.pomoState) return;

    const wasWork = (pomoState.mode === 'work');

    // 원본 로직 실행 (토스트, 사운드, 모드 전환)
    _origPomoComplete.apply(this, arguments);

    // 완료 후 endAt 초기화
    pomoState.endAt = null;

    if (wasWork) {
      // 오늘의 완료 카운트 증가
      const todayCount = incDaily();

      // OS 알림
      const editor = document.getElementById('prose-editor') || document.getElementById('focus-editor');
      const msg = `오늘 ${todayCount}회째 · 휴식 시간입니다`;
      showNotif('🍅 집필 세션 완료', msg);
    } else {
      showNotif('☕ 휴식 끝', '다시 집필을 시작해보세요');
    }

    saveState();
    renderTodayCount();
  };

  // ─── pomoReset / pomoSkip 덮어쓰기 ─────────────────────────────
  const _origPomoReset = window.pomoReset;
  window.pomoReset = function () {
    _origPomoReset.apply(this, arguments);
    if (window.pomoState) pomoState.endAt = null;
    saveState();
  };

  const _origPomoSkip = window.pomoSkip;
  window.pomoSkip = function () {
    _origPomoSkip.apply(this, arguments);
    saveState();
  };

  // closePomodoro 에서 일시정지하는 원본 동작은 유지.
  // 다만 상태 저장 추가.
  const _origClosePomodoro = window.closePomodoro;
  window.closePomodoro = function () {
    _origClosePomodoro.apply(this, arguments);
    saveState();
  };

  // ─── 탭 제목에 시간 표시 ────────────────────────────────────────
  let _origTitle = null;
  function updateTabTitle() {
    if (!window.pomoState) return;
    if (_origTitle == null) _origTitle = document.title;
    if (!pomoState.running) {
      if (document.title !== _origTitle) document.title = _origTitle;
      return;
    }
    const m = String(Math.floor(pomoState.remaining / 60)).padStart(2, '0');
    const s = String(pomoState.remaining % 60).padStart(2, '0');
    const icon = pomoState.mode === 'work' ? '🍅' : '☕';
    document.title = `${icon} ${m}:${s} · ${_origTitle}`;
  }

  // ─── visibilitychange: 돌아왔을 때 즉시 재동기화 ────────────────
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState !== 'visible') return;
    if (!window.pomoState || !pomoState.running) return;
    // 그 사이 타이머가 지연됐을 수 있으니 바로 tick 재실행
    pomoTick();
  });

  // ─── 페이지 나갈 때 상태 저장 ───────────────────────────────────
  window.addEventListener('pagehide', saveState);
  window.addEventListener('beforeunload', saveState);

  // ─── 오늘의 뽀모 카운트 표시 (위젯에 작게 추가) ────────────────
  function renderTodayCount() {
    const widget = document.getElementById('pomo-widget');
    if (!widget) return;
    let el = document.getElementById('pomo-today-count');
    if (!el) {
      const info = document.getElementById('pomo-session-info');
      if (!info) return;
      el = document.createElement('div');
      el.id = 'pomo-today-count';
      el.style.cssText = 'font-size:10px;color:rgba(255,255,255,.45);margin-top:3px;text-align:center';
      info.parentNode.insertBefore(el, info.nextSibling);
    }
    const n = getTodayCount();
    el.textContent = n > 0 ? `오늘 완료 ${n}회 🎯` : '';
  }

  // ─── 앱 시작 시 이전 상태 복원 ──────────────────────────────────
  function restoreOnLoad() {
    if (!window.pomoState) return;
    const saved = loadState();
    if (!saved) return;

    // 핵심 필드 복원
    pomoState.mode          = saved.mode          || 'work';
    pomoState.total         = saved.total         || pomoState.total;
    pomoState.session       = saved.session       || 1;
    pomoState.goal          = saved.goal          || pomoState.goal;
    pomoState.completedWork = saved.completedWork || 0;
    pomoState.startChars    = saved.startChars    || 0;

    if (saved.running && saved.endAt) {
      const now = Date.now();
      const rem = Math.ceil((saved.endAt - now) / 1000);
      if (rem > 0) {
        // 아직 시간 남음 — 계속 실행
        pomoState.remaining = rem;
        pomoState.endAt = saved.endAt;
        pomoState.running = true;
        pomoState.timer = setInterval(pomoTick, 1000);
        const btn = document.getElementById('pomo-playpause');
        if (btn) btn.textContent = 'II';
      } else {
        // 떠나있는 동안 시간 끝남 — 완료 처리
        // 단, 너무 오래전(6시간 초과)이면 노이즈라 무시
        if (now - saved.endAt < 6 * 3600 * 1000) {
          pomoState.remaining = 0;
          pomoState.endAt = saved.endAt;
          pomoState.running = true; // complete 내부에서 false 됨
          setTimeout(() => {
            if (typeof pomoComplete === 'function') pomoComplete();
          }, 500);
        } else {
          // 세션 버림, 리셋
          pomoState.remaining = pomoState.total;
          pomoState.running = false;
          pomoState.endAt = null;
        }
      }
    } else {
      // 일시정지 상태 복원
      pomoState.remaining = saved.remaining || pomoState.total;
      pomoState.running = false;
      pomoState.endAt = null;
    }

    // UI 갱신 (위젯이 숨김 상태면 내부 데이터만 맞춰둠)
    if (typeof pomoUpdateDisplay === 'function') {
      const w = document.getElementById('pomo-widget');
      if (w && w.style.display !== 'none') pomoUpdateDisplay();
    }
    if (typeof pomoRenderDots === 'function') pomoRenderDots();
    updateTabTitle();
    renderTodayCount();
  }

  // togglePomodoro 호출 후에도 오늘 카운트 표시되도록 훅
  const _origTogglePomodoro = window.togglePomodoro;
  window.togglePomodoro = function () {
    _origTogglePomodoro.apply(this, arguments);
    renderTodayCount();
  };

  // 초기 복원은 원본 뽀모 초기화가 끝난 뒤
  setTimeout(restoreOnLoad, 300);

  // ─── 자정 넘어가면 오늘 카운트 UI 갱신 ─────────────────────────
  // 실행 중 자정 지나도 자연스럽게 카운트가 '0'으로 넘어가도록
  setInterval(renderTodayCount, 60 * 1000);
})();
</script>

<!-- ═══════════════════════════════════════════════════════════════
     TIER 뽀모-2 패치 (v1)
     
     1) 스페이스바 재생/일시정지 (에디터 포커스 제외)
     2) 작업/짧은휴식/긴휴식 시간 커스터마이즈 + 프리셋
     3) 긴 휴식 주기를 설정 가능하게 (기본 4회 → goal 연동 가능)
     4) 자동 연쇄 실행 옵션 (휴식 끝나면 자동으로 다음 세션 시작)
     
     설정 UI는 위젯 헤더에 ⚙️ 버튼, 클릭 시 슬라이드 패널.
     ═══════════════════════════════════════════════════════════════ -->
<script>
(function PomodoroTier2() {
  'use strict';

  const STORAGE_CONFIG = 'wnstudio_pomo_config';

  // ─── 기본 설정 + 프리셋 ─────────────────────────────────────────
  const DEFAULT_CFG = {
    workMin: 25,
    shortMin: 5,
    longMin: 15,
    longEvery: 4,      // 몇 회 작업마다 긴 휴식
    autoChain: false,  // 휴식 끝나면 자동으로 다음 세션 시작
  };

  const PRESETS = [
    { id: 'classic',   name: '클래식 25·5·15',   workMin: 25, shortMin: 5,  longMin: 15, longEvery: 4 },
    { id: 'extended',  name: '확장 50·10·20',    workMin: 50, shortMin: 10, longMin: 20, longEvery: 3 },
    { id: 'deepwork',  name: '딥 워크 90·15·30', workMin: 90, shortMin: 15, longMin: 30, longEvery: 2 },
    { id: 'sprint',    name: '스프린트 15·3·10', workMin: 15, shortMin: 3,  longMin: 10, longEvery: 4 },
  ];

  function loadCfg() {
    try {
      const raw = localStorage.getItem(STORAGE_CONFIG);
      if (!raw) return { ...DEFAULT_CFG };
      return { ...DEFAULT_CFG, ...JSON.parse(raw) };
    } catch(e) { return { ...DEFAULT_CFG }; }
  }

  function saveCfg(cfg) {
    try { localStorage.setItem(STORAGE_CONFIG, JSON.stringify(cfg)); } catch(e) {}
  }

  let cfg = loadCfg();

  // ─── 원본 상수값 (POMO_WORK 등)은 const 라 덮어쓸 수 없음 ────────
  // 대신 pomoToggle/pomoComplete 가 참조할 때마다 cfg 를 보도록
  // 그 함수들을 "재정의"한다. 다행히 이미 이전 패치들에서 덮어쓴 상태.
  // 여기서는 pomoState.total / remaining 을 재계산하는 헬퍼만 제공.
  function secFor(mode) {
    if (mode === 'work')  return cfg.workMin  * 60;
    if (mode === 'short') return cfg.shortMin * 60;
    if (mode === 'long')  return cfg.longMin  * 60;
    return cfg.workMin * 60;
  }

  // ─── pomoComplete 에서 긴 휴식 판정을 cfg.longEvery 로 ─────────
  // 원본은 `completedWork % 4 === 0`. 이걸 바꾸려면 완성된 뒤
  // 이미 mode 가 'short' 나 'long' 으로 결정된 상태를 보정해야 함.
  const _prevPomoComplete = window.pomoComplete;
  window.pomoComplete = function () {
    if (!window.pomoState) { return _prevPomoComplete.apply(this, arguments); }

    const wasWork = (pomoState.mode === 'work');
    _prevPomoComplete.apply(this, arguments);

    // 작업 세션 완료 직후 원본이 mode 를 short/long 으로 바꿔놨음.
    // cfg.longEvery 에 맞게 재계산.
    if (wasWork && pomoState.completedWork > 0) {
      const isLong = (pomoState.completedWork % cfg.longEvery === 0);
      const newMode = isLong ? 'long' : 'short';
      const newTotal = secFor(newMode);
      if (pomoState.mode !== newMode || pomoState.total !== newTotal) {
        pomoState.mode = newMode;
        pomoState.total = newTotal;
        pomoState.remaining = newTotal;
        if (typeof pomoUpdateDisplay === 'function') pomoUpdateDisplay();
      }
    }

    // 작업 세션 total 도 cfg 로 맞춤 (원본은 POMO_WORK 상수 사용)
    if (!wasWork) {
      // 휴식 끝남 → 다음 작업 세션 시간도 cfg.workMin
      pomoState.total = secFor('work');
      pomoState.remaining = pomoState.total;
      if (typeof pomoUpdateDisplay === 'function') pomoUpdateDisplay();
    }

    // 자동 연쇄: 휴식 끝난 뒤 자동으로 다음 작업 시작
    // (단, 작업 완료 직후에는 적용 X — 휴식은 무조건 눌러야 시작)
    if (!wasWork && cfg.autoChain) {
      setTimeout(() => {
        if (typeof pomoToggle === 'function' && !pomoState.running) pomoToggle();
      }, 800);
    }
  };

  // ─── 작업 시작 시 cfg 값 반영 ────────────────────────────────────
  // pomoToggle 이 시작 시 이전에 'remaining === POMO_WORK' 인지 체크해서
  // startChars 를 저장함. POMO_WORK 는 바뀌지 않으니 이 조건은 거의 항상 false.
  // 대신 우리가 직접 'pomoState.mode === work 이고 remaining === total' 체크.
  const _prevPomoToggle = window.pomoToggle;
  window.pomoToggle = function () {
    if (!window.pomoState) return _prevPomoToggle.apply(this, arguments);

    // 시작하려는 순간 mode 의 total 을 cfg 에 맞춰놓기
    if (!pomoState.running) {
      const wantedTotal = secFor(pomoState.mode);
      // remaining 이 이전 total 과 같다 = 처음 시작 = cfg 에 맞춰 재설정
      if (pomoState.remaining === pomoState.total) {
        pomoState.total = wantedTotal;
        pomoState.remaining = wantedTotal;
      } else if (pomoState.total !== wantedTotal) {
        // 중간 시작(일시정지에서 재개) — total 은 cfg 로 맞추되 remaining 은 유지
        pomoState.total = wantedTotal;
      }
    }
    _prevPomoToggle.apply(this, arguments);
  };

  // ─── pomoReset 시에도 cfg 반영 ──────────────────────────────────
  const _prevPomoReset = window.pomoReset;
  window.pomoReset = function () {
    if (window.pomoState) {
      pomoState.total = secFor(pomoState.mode);
      pomoState.remaining = pomoState.total;
    }
    _prevPomoReset.apply(this, arguments);
  };

  // ─── 스페이스바 재생/일시정지 ───────────────────────────────────
  document.addEventListener('keydown', (e) => {
    if (e.key !== ' ' && e.code !== 'Space') return;
    if (e.ctrlKey || e.metaKey || e.altKey || e.shiftKey) return;

    // 위젯이 열려있지 않으면 무시
    const widget = document.getElementById('pomo-widget');
    if (!widget || widget.style.display === 'none') return;

    // 텍스트 입력 중이면 무시
    const t = document.activeElement;
    if (t) {
      const tag = t.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || t.isContentEditable) return;
    }

    e.preventDefault();
    if (typeof pomoToggle === 'function') pomoToggle();
  });

  // ─── 설정 패널 UI ──────────────────────────────────────────────
  function injectSettingsButton() {
    const header = document.getElementById('pomo-header');
    if (!header) return;
    if (document.getElementById('pomo-settings-btn')) return;

    // 기존 접기 버튼 앞에 설정 버튼 삽입
    const collapseBtn = document.getElementById('pomo-collapse-btn');
    if (!collapseBtn) return;

    const btn = document.createElement('button');
    btn.id = 'pomo-settings-btn';
    btn.title = '설정';
    btn.innerHTML = '⚙';
    btn.style.cssText = `
      background:none; border:none; cursor:pointer;
      color:rgba(255,255,255,.6); font-size:15px;
      padding:2px 6px; margin-right:2px;
      line-height:1;
    `;
    btn.addEventListener('click', toggleSettings);
    collapseBtn.parentNode.insertBefore(btn, collapseBtn);
  }

  function toggleSettings() {
    let panel = document.getElementById('pomo-settings-panel');
    if (panel) {
      panel.remove();
      return;
    }

    const widget = document.getElementById('pomo-widget');
    const body = document.getElementById('pomo-body');
    if (!widget || !body) return;

    panel = document.createElement('div');
    panel.id = 'pomo-settings-panel';
    panel.style.cssText = `
      background:rgba(0,0,0,.3); padding:12px 14px;
      border-top:1px solid rgba(255,255,255,.1);
      font-size:11px; color:rgba(255,255,255,.8);
      font-family:'Noto Sans KR',sans-serif;
    `;
    panel.innerHTML = `
      <div style="font-size:10px;color:rgba(255,255,255,.5);margin-bottom:8px;letter-spacing:.5px">프리셋</div>
      <div id="pomo-presets" style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:12px">
        ${PRESETS.map(p => `
          <button data-preset="${p.id}" style="
            background:rgba(255,255,255,.08); color:#fff; border:1px solid rgba(255,255,255,.12);
            border-radius:6px; padding:6px 8px; cursor:pointer;
            font-size:10px; font-family:'Noto Sans KR',sans-serif;
            text-align:left; line-height:1.3;
          ">${p.name}</button>
        `).join('')}
      </div>

      <div style="font-size:10px;color:rgba(255,255,255,.5);margin-bottom:8px;letter-spacing:.5px">직접 설정 (분)</div>
      <div style="display:grid;grid-template-columns:auto 1fr auto;gap:6px 8px;align-items:center;margin-bottom:12px">
        <span>🍅 집필</span>
        <input type="range" id="cfg-work"  min="5"  max="120" step="5"  value="${cfg.workMin}" style="width:100%">
        <span id="cfg-work-val"  style="min-width:32px;text-align:right;font-weight:700">${cfg.workMin}분</span>

        <span>☕ 짧은</span>
        <input type="range" id="cfg-short" min="1"  max="30"  step="1"  value="${cfg.shortMin}" style="width:100%">
        <span id="cfg-short-val" style="min-width:32px;text-align:right;font-weight:700">${cfg.shortMin}분</span>

        <span>🌙 긴</span>
        <input type="range" id="cfg-long"  min="5"  max="60"  step="5"  value="${cfg.longMin}" style="width:100%">
        <span id="cfg-long-val"  style="min-width:32px;text-align:right;font-weight:700">${cfg.longMin}분</span>

        <span style="white-space:nowrap">긴 휴식 주기</span>
        <input type="range" id="cfg-every" min="1"  max="8"   step="1"  value="${cfg.longEvery}" style="width:100%">
        <span id="cfg-every-val" style="min-width:32px;text-align:right;font-weight:700">${cfg.longEvery}회</span>
      </div>

      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:6px 0;border-top:1px solid rgba(255,255,255,.08)">
        <input type="checkbox" id="cfg-autochain" ${cfg.autoChain ? 'checked' : ''}
          style="margin:0;accent-color:var(--gold);width:14px;height:14px">
        <span style="font-size:11px">휴식 끝나면 자동으로 다음 집필 시작</span>
      </label>

      <div style="font-size:9px;color:rgba(255,255,255,.35);margin-top:6px;text-align:center">
        스페이스바 = 재생/일시정지
      </div>
    `;

    body.appendChild(panel);

    // ─── 프리셋 버튼 ───
    panel.querySelectorAll('[data-preset]').forEach(b => {
      b.addEventListener('click', () => {
        const preset = PRESETS.find(p => p.id === b.dataset.preset);
        if (!preset) return;
        cfg.workMin = preset.workMin;
        cfg.shortMin = preset.shortMin;
        cfg.longMin = preset.longMin;
        cfg.longEvery = preset.longEvery;
        saveCfg(cfg);
        applyCfgLive();
        toggleSettings();  // 닫기
        toggleSettings();  // 다시 열기 (값 갱신)
      });
    });

    // ─── 슬라이더 ───
    function bindSlider(inputId, valId, key, suffix) {
      const inp = panel.querySelector('#' + inputId);
      const val = panel.querySelector('#' + valId);
      inp.addEventListener('input', () => {
        val.textContent = inp.value + suffix;
      });
      inp.addEventListener('change', () => {
        cfg[key] = parseInt(inp.value);
        saveCfg(cfg);
        applyCfgLive();
      });
    }
    bindSlider('cfg-work',  'cfg-work-val',  'workMin',   '분');
    bindSlider('cfg-short', 'cfg-short-val', 'shortMin',  '분');
    bindSlider('cfg-long',  'cfg-long-val',  'longMin',   '분');
    bindSlider('cfg-every', 'cfg-every-val', 'longEvery', '회');

    // ─── 자동 연쇄 ───
    panel.querySelector('#cfg-autochain').addEventListener('change', (e) => {
      cfg.autoChain = e.target.checked;
      saveCfg(cfg);
    });
  }

  // 설정이 바뀌면 현재 실행 중이 아닌 타이머는 즉시 반영
  function applyCfgLive() {
    if (!window.pomoState) return;
    if (pomoState.running) return; // 실행 중엔 다음 세션부터 적용
    pomoState.total = secFor(pomoState.mode);
    pomoState.remaining = pomoState.total;
    if (typeof pomoUpdateDisplay === 'function') pomoUpdateDisplay();
  }

  // ─── togglePomodoro 시 설정 버튼 주입 ───────────────────────────
  const _origTogglePomodoro = window.togglePomodoro;
  window.togglePomodoro = function () {
    _origTogglePomodoro.apply(this, arguments);
    setTimeout(injectSettingsButton, 10);
  };

  // 초기에 이미 열려있는 상태라면 붙이기
  setTimeout(injectSettingsButton, 500);

  // ─── 최초 로드 시 현재 모드의 total/remaining 을 cfg 에 맞춰둠 ──
  setTimeout(() => {
    if (!window.pomoState) return;
    if (pomoState.running) return;
    pomoState.total = secFor(pomoState.mode);
    pomoState.remaining = pomoState.total;
    if (typeof pomoUpdateDisplay === 'function') pomoUpdateDisplay();
  }, 400);
})();
</script>

</body>
</html>
